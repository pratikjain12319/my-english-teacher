name: Deploy Pages
on:
  push:
    branches: ["main"] # Double-check if your branch is named 'main' or 'master'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        # This replaces REPLACE_WITH_API_KEY with your actual secret
        run: sed -i "s|REPLACE_WITH_API_KEY|${{ secrets.API_KEY }}|g" index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
