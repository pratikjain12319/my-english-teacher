<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Terminal V2.5</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #080808;
            --user: #00d4ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg); color: var(--neon); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #header {
            padding: 10px; border-bottom: 1px solid var(--neon);
            text-align: center; font-size: 0.7rem; letter-spacing: 2px;
            background: rgba(0, 255, 65, 0.05); text-shadow: 0 0 5px var(--neon);
        }

        #chat-container { 
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 100px;
        }

        .message { 
            padding: 10px; border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 4px; max-width: 92%; line-height: 1.4; font-size: 0.9rem;
            background: rgba(0, 255, 65, 0.02); position: relative;
        }

        .user-msg { align-self: flex-end; border-color: var(--user); color: var(--user); background: rgba(0, 212, 255, 0.05); }

        .label { font-size: 0.6rem; font-weight: bold; margin-bottom: 4px; display: block; opacity: 0.6; text-transform: uppercase; }

        #input-area { 
            position: fixed; bottom: 0; width: 100%;
            background: #000; border-top: 1px solid var(--neon);
            padding: 12px; display: flex; align-items: center; gap: 10px;
        }

        input { 
            flex: 1; background: #111; border: 1px solid var(--neon);
            color: var(--neon); padding: 12px; border-radius: 4px;
            font-family: inherit; outline: none; font-size: 16px;
        }

        .btn {
            background: transparent; border: 1px solid var(--neon);
            color: var(--neon); width: 48px; height: 48px;
            border-radius: 4px; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        #mic-btn.active { background: #ff4444; border-color: #ff4444; color: white; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #status-bar { font-size: 0.6rem; padding: 4px 10px; background: #000; color: #444; display: flex; justify-content: space-between; border-top: 1px solid #222;}
    </style>
</head>
<body>

<div id="header">TERMINAL_LINK // MODEL_2.5_FLASH</div>

<div id="chat-container">
    <div class="message">
        <span class="label">System_Log</span>
        English Tutor Online. <br><br>
        <button onclick="requestMicPermission()" style="background:var(--neon); color:black; border:none; padding:5px 10px; font-family:inherit; cursor:pointer;">ACTIVATE_MICROPHONE</button>
        <br><br>Status: Awaiting user input.
    </div>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Enter text..." autocomplete="off">
    <button id="mic-btn" class="btn">🎤</button>
    <button id="send-btn" class="btn">➤</button>
</div>

<div id="status-bar">
    <span id="state">IDLE</span>
    <span id="error-log"></span>
</div>

<script>
    const API_KEY = "REPLACE_WITH_API_KEY";
    const MODEL = "gemini-2.5-flash"; // Updated for 2026 v1beta compatibility
    
    const SYSTEM_PROMPT = "You are a professional English Teacher. Always follow this structure: 1. If the user made any English mistakes, start with [CORRECTION] and fix them. 2. Give a brief explanation of why. 3. Continue the conversation in simple, helpful English. Keep responses short.";

    const container = document.getElementById('chat-container');
    const input = document.getElementById('user-input');
    const state = document.getElementById('state');
    const errorLog = document.getElementById('error-log');
    const micBtn = document.getElementById('mic-btn');

    let history = [{ role: "user", parts: [{ text: SYSTEM_PROMPT }] }];

    // Audio Output
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text.replace(/\[CORRECTION\]|[*#]/g, ''));
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    // Explicit Mic Permission Request for Android Chrome
    async function requestMicPermission() {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            addMsg("Microphone access GRANTED. You can now use the 🎤 icon.", '', 'SYSTEM');
        } catch (e) {
            addMsg("Microphone access DENIED. Please check site settings.", '', 'SYSTEM');
        }
    }

    // Speech Recognition
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.onstart = () => { micBtn.classList.add('active'); state.innerText = "LISTENING"; };
        recognition.onend = () => { micBtn.classList.remove('active'); state.innerText = "PROCESSING"; };
        recognition.onresult = (e) => {
            input.value = e.results[0][0].transcript;
            send();
        };
        recognition.onerror = (e) => {
            errorLog.innerText = "MIC_ERR: " + e.error;
            micBtn.classList.remove('active');
        };
    }

    micBtn.onclick = () => {
        if (recognition) {
            try { recognition.start(); } catch(e) { recognition.stop(); }
        } else {
            addMsg("Speech recognition not supported in this browser.", '', 'SYSTEM');
        }
    };

    async function send() {
        const val = input.value.trim();
        if (!val) return;

        addMsg(val, 'user-msg', 'User');
        input.value = '';
        history.push({ role: "user", parts: [{ text: val }] });

        state.innerText = "CONNECTING...";
        errorLog.innerText = "";

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: history.slice(-8) }) 
            });

            const data = await res.json();
            
            if (data.error) throw new Error(data.error.message);

            const aiText = data.candidates[0].content.parts[0].text;
            addMsg(aiText, '', 'Tutor');
            speak(aiText);
            history.push({ role: "model", parts: [{ text: aiText }] });
            state.innerText = "IDLE";

        } catch (err) {
            errorLog.innerText = "ERR: LINK_FAILED";
            addMsg("CONNECTION ERROR: " + err.message, '', 'SYSTEM');
        }
    }

    function addMsg(text, type, label) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `<span class="label">${label}</span>${text.replace(/\n/g, '<br>')}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    document.getElementById('send-btn').onclick = send;
    input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
